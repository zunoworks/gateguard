name: 'GateGuard Check'
description: 'Verify GateGuard fact-forcing gate is configured for Claude Code'
branding:
  icon: 'shield'
  color: 'blue'
inputs:
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.12'
runs:
  using: 'composite'
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
    - shell: bash
      run: pip install gateguard-ai
    - shell: bash
      run: |
        if [ ! -f .gateguard.yml ]; then
          echo "::warning::No .gateguard.yml found. Run 'gateguard init' to set up GateGuard."
          exit 0
        fi
        echo "GateGuard configuration found."
        gateguard --version
